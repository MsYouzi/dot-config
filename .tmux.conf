# ~/.tmux.conf
# =========================================================
# tmux 3.x config — primary tab/split/session manager as of v0.5.0.
# Theme: Gruvbox Dark Hard (matches wezterm).
# Prefix: C-q (chosen for ergonomics — far from C-c/d/z, doesn't collide
# with readline's C-b history, and on modern macOS the legacy C-q XON flow
# control is disabled by default so nothing reclaims the keystroke).
#
# Quick reference
#   Reload      : prefix + r
#   New tab     : prefix + c                (cwd inherited)
#   Close pane  : prefix + x
#   Split right : prefix + |                (cwd inherited)
#   Split down  : prefix + -                (cwd inherited)
#   Pane focus  : prefix + h/j/k/l
#   Resize pane : prefix + H/J/K/L          (repeatable, no need to re-prefix)
#   Zoom pane   : prefix + z                (default)
#   Cycle layout: prefix + Space            (default)
#   Tabs        : prefix + n / p / 1..9 / Tab
#   Sessions    : prefix + s (list) / d (detach) / $ (rename)
#   Resurrect   : prefix + Ctrl-s save / Ctrl-r restore
#   Plugins     : prefix + I install / U update
# =========================================================

# ---------------------------------------------------------
# Prefix — C-q (unbind default C-b first; bind a second C-q so you can
# still type a literal C-q inside the active pane via prefix + C-q).
# ---------------------------------------------------------
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# ---------------------------------------------------------
# Reload
# ---------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# ---------------------------------------------------------
# General
# ---------------------------------------------------------
# Default to a real 256-color terminfo. tmux-256color is shipped by ncurses
# 6.1+; macOS Tahoe ships it. RGB is enabled below for true-color.
set -g default-terminal "tmux-256color"
# True-color (24-bit) for terminals that announce it. Cover WezTerm,
# xterm-256color, and the generic "*-direct" form.
set -ag terminal-overrides ",wezterm:RGB,xterm-256color:RGB,*-direct:RGB"
# Undercurl (modern vim/nvim diagnostics)
set -ag terminal-overrides ",*:Smulx=\\E[4::%p1%dm,*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# Scrub stale terminfo/terminal-identity env that would derail the
# `default-terminal` lookup above. Symptom of contamination: tmux silently
# falls back from `tmux-256color` to `xterm-color` (8-color) and TUIs like
# Copilot CLI degrade to ANSI-only chrome (no truecolor input panel).
#
# Common cause: tmux server was started from a now-uninstalled terminal
# (e.g., Ghostty) whose installer pointed `$TERMINFO` at its bundle dir.
# After uninstall the dir is gone, but the long-lived tmux server keeps
# the dead path forever — and every new pane inherits it.
#
# Defense: explicitly unset these for new panes, then force COLORTERM so
# truecolor detection (used by Node/Rust/Python TUIs) doesn't depend on
# terminfo at all. Recovery for an already-poisoned server: kill it once
# (`tmux kill-server` outside any tmux pane).
set-environment -gu TERMINFO
set-environment -gu TERMINFO_DIRS
set-environment -gu TERMCAP
set-environment -gu TERM_PROGRAM
set-environment -gu TERM_PROGRAM_VERSION
set-environment -g  COLORTERM truecolor
# FORCE_COLOR=3 is the highest-priority short-circuit in Node's
# supports-color (used by Copilot CLI, ink-based TUIs, eslint, prettier,
# etc.). It bypasses TERM/COLORTERM detection entirely and forces 24-bit
# color output, sidestepping any stale TERM string an existing pane might
# have inherited (e.g. xterm-256color from before this config landed).
set-environment -g  FORCE_COLOR 3

set -g mouse on
set -sg escape-time 0          # vim-friendly ESC
set -g history-limit 100000
set -g renumber-windows on     # close one window → others renumber, no gaps
set -g base-index 1            # start window numbers at 1
setw -g pane-base-index 1      # start pane numbers at 1
set -g focus-events on         # forward terminal focus events to vim/nvim
set -g monitor-activity on
set -g visual-activity off
set -g set-titles on           # let the outer terminal show the active session
set -g set-titles-string "#S · #W"
# Windows keep titles set by gg() / vim / etc. (no auto-rename clobber)
set -g allow-rename off
setw -g automatic-rename off

# OSC 52: let nested vim / SSH copy to the host clipboard via escape codes.
# WezTerm honours OSC 52 when its clipboard option is on, so this works
# locally and over SSH without xclip/pbcopy plumbing.
set -g set-clipboard on

# ---------------------------------------------------------
# Splits — vim-style + intuitive symbols, inherit cwd
# ---------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

# ---------------------------------------------------------
# Pane navigation — vim hjkl
# ---------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------
# Pane resize — capital HJKL, repeatable (-r) so you don't re-prefix
# ---------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# ---------------------------------------------------------
# Copy mode — vi keys + cross-platform clipboard via OSC 52
# ---------------------------------------------------------
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# `copy-selection` (no -and-cancel suffix) emits OSC 52 because of
# `set-clipboard on`; no pbcopy/xclip wiring needed.
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------
# Status bar — Gruvbox Dark Hard, top, hand-rolled (no plugin theme)
# Palette mirrors wezterm/wezterm.lua so the chrome looks identical.
# ---------------------------------------------------------
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1d2021,fg=#ebdbb2"

# Left: session name in a yellow pill, plus a subtle right edge.
set -g status-left-length 40
set -g status-left "#[fg=#1d2021,bg=#fabd2f,bold]  #S #[fg=#fabd2f,bg=#1d2021,nobold]  "

# Right: prefix indicator (only while prefix is held), then HH:MM and date.
set -g status-right-length 70
set -g status-right "#{?client_prefix,#[fg=#fb4934]󰌌 PREFIX  ,}#[fg=#83a598]󰥔 %H:%M #[fg=#928374]│#[fg=#a89984] %Y-%m-%d "

# Window list — inactive in dim grey on bg0; active in dark text on a Gruvbox
# bright-blue pill. `#{?window_zoomed_flag, ,}` adds a magnifier when zoomed.
set -g window-status-format         "#[fg=#928374,bg=#282828]  #I·#W  "
set -g window-status-current-format "#[fg=#1d2021,bg=#83a598,bold]  #I·#W#{?window_zoomed_flag, ,}  "
set -g window-status-separator " "
setw -g window-status-activity-style "fg=#fb4934,bg=#282828,bold"

# Pane border — inactive sits on bg1, active glows with bright yellow.
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"
set -g pane-border-status off

# Status messages + command prompt
set -g message-style "bg=#fabd2f,fg=#1d2021,bold"
set -g message-command-style "bg=#83a598,fg=#1d2021,bold"
# Copy / search highlight in copy-mode
set -g mode-style "bg=#fabd2f,fg=#1d2021,bold"

# ---------------------------------------------------------
# Plugins — TPM (Tmux Plugin Manager)
#   prefix + I       : install missing plugins
#   prefix + U       : update plugins
#   prefix + Alt-u   : remove plugins not listed here
# ---------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # opinionated defaults that don't fight ours
set -g @plugin 'tmux-plugins/tmux-yank'       # cross-platform clipboard helpers
set -g @plugin 'tmux-plugins/tmux-resurrect'  # save/restore sessions (prefix + Ctrl-s/r)
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto-save sessions every N minutes

# Resurrect: capture pane contents + restore vim/nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Bootstrap TPM on first run.
#   1) Clone TPM if missing (BEFORE the tpm init line below).
#   2) tpm init (last line) sets TMUX_PLUGIN_MANAGER_PATH in tmux's env.
#   3) AFTER tpm init, kick off install_plugins for any missing plugins.
# Order matters: install_plugins reads TMUX_PLUGIN_MANAGER_PATH from tmux,
# which only gets set once tpm.sh has run.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Initialise TPM — MUST be the very last `set` / TPM-touching line above.
run '~/.tmux/plugins/tpm/tpm'

# First-run plugin install (tmux-sensible is the canary). Idempotent: if
# all plugins are present, install_plugins reports "Already installed" and
# exits cleanly; cost is one fork per plugin name lookup.
if "test ! -d ~/.tmux/plugins/tmux-sensible" \
   "run '~/.tmux/plugins/tpm/bin/install_plugins'"
